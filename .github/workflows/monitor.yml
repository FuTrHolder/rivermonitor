name: River Airdrop Monitor

on:
  schedule:
    - cron: '*/5 * * * *'  # 5분마다 실행
  workflow_dispatch:      # 수동 실행 버튼

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Check Actual Rate & Alert
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          python3 << 'EOF'
          import urllib.request
          import json
          import os
          import sys

          # 설정 값
          TARGET = 0.01
          TG_TOKEN = os.environ.get('TG_TOKEN')
          CHAT_ID = os.environ.get('CHAT_ID')

          if not TG_TOKEN or not CHAT_ID:
              print("Error: TG_TOKEN 또는 CHAT_ID가 설정되지 않았습니다.")
              sys.exit(1)

          try:
              # 1. API 호출
              url = 'https://api-airdrop.river.inc/s2/pts-conversion-chart?interval=1d'
              req = urllib.request.Request(url, headers={'Cache-Control': 'no-store'})
              
              with urllib.request.urlopen(req) as res:
                  data = json.loads(res.read())

              # 데이터 파싱
              valid = [x for x in data['data'] if x['actualRate'] is not None]
              if not valid:
                  print("데이터를 찾을 수 없습니다.")
                  sys.exit(0)

              last = valid[-1]
              actual = last['actualRate']
              ideal = last['expectedRate']
              
              # 2. 메시지 구성 (조건에 따른 분기)
              # 목표 달성 시 (0.01 이상)
              if actual >= TARGET:
                  header = "🚨 [GOAL REACHED] River Airdrop 🚨"
                  status_icon = "🔥"
                  target_status = f"✅ 목표치({TARGET}) 돌파!!"
              # 목표 미달 시 (평상시)
              else:
                  header = "ℹ️ [Periodic Update] River Airdrop"
                  status_icon = "📊"
                  target_status = f"⏳ 목표치({TARGET}) 대기 중"

              msg = (
                  f"{header}\n\n"
                  f"{status_icon} Actual Rate: {actual}\n"
                  f"📈 Expected Rate: {ideal}\n\n"
                  f"{target_status}\n"
                  f"⏰ 조회 시간: (UTC) {last.get('timestamp', 'N/A')}"
              )

              # 3. 텔레그램 메시지 전송 (매 5분마다 무조건 전송)
              tg_url = f'https://api.telegram.org/bot{TG_TOKEN}/sendMessage'
              payload = {
                  'chat_id': CHAT_ID,
                  'text': msg,
                  'parse_mode': 'Markdown' # 굵게 표시 등 스타일 적용을 위해 추가
              }
              
              body = json.dumps(payload).encode('utf-8')
              req2 = urllib.request.Request(
                  tg_url, 
                  data=body, 
                  headers={'Content-Type': 'application/json'}, 
                  method='POST'
              )
              
              with urllib.request.urlopen(req2) as response:
                  if response.status == 200:
                      print(f'✅ 전송 완료! (Current: {actual})')
                  else:
                      print(f'❌ 전송 실패: {response.status}')

          except Exception as e:
              print(f"오류 발생: {e}")
          EOF
