name: River Airdrop Monitor

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Run monitor
        run: |
          python3 - <<EOF
          import urllib.request
          import json
          import time

          TARGET = 0.01
          TG_TOKEN = "${{ secrets.TG_TOKEN }}"
          CHAT_ID = "${{ secrets.CHAT_ID }}"

          API_URL = "https://api-airdrop.river.inc/s2/pts-conversion-chart?interval=1d"

          def fetch():
              for i in range(3):
                  try:
                      req = urllib.request.Request(API_URL, headers={"Cache-Control": "no-store"})
                      with urllib.request.urlopen(req, timeout=10) as res:
                          return json.loads(res.read())
                  except Exception as e:
                      print("retry", e)
                      time.sleep(2)
              return None

          data = fetch()

          if not data:
              print("API error")
              exit()

          valid = [x for x in data["data"] if x["actualRate"] is not None]

          if not valid:
              print("no data")
              exit()

          last = valid[-1]

          actual = float(last["actualRate"])
          ideal = float(last["expectedRate"])

          print("actual:", actual)
          print("ideal:", ideal)

          if actual >= TARGET:
              message = f"""
🚨 River Airdrop 목표 도달!

Actual Rate : {actual:.6f}
Target      : {TARGET}

🔥 Target reached
"""
          else:
              message = f"""
📊 River Conversion Update

Actual Rate : {actual:.6f}
Ideal Rate  : {ideal:.6f}
Target      : {TARGET}

⏱ Update every 5 minutes
"""

          url = f"https://api.telegram.org/bot{TG_TOKEN}/sendMessage"

          body = json.dumps({
              "chat_id": CHAT_ID,
              "text": message
          }).encode()

          req = urllib.request.Request(
              url,
              data=body,
              headers={"Content-Type": "application/json"},
              method="POST"
          )

          urllib.request.urlopen(req)

          print("telegram sent")
          EOF
