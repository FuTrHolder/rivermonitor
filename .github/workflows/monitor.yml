name: River Airdrop Monitor

on:
  schedule:
    - cron: '*/5 * * * *'  # 5분마다 실행
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Check Actual Rate & Send Telegram
        run: |
          python3 << 'EOF'
          import urllib.request
          import json

          TARGET = 0.01
          TG_TOKEN = '${{ secrets.TG_TOKEN }}'
          CHAT_ID = '${{ secrets.CHAT_ID }}'

          url = 'https://api-airdrop.river.inc/s2/pts-conversion-chart?interval=1d'

          try:
              req = urllib.request.Request(url, headers={'Cache-Control': 'no-store'})
              with urllib.request.urlopen(req) as res:
                  data = json.loads(res.read())

              valid = [x for x in data['data'] if x['actualRate'] is not None]

              if not valid:
                  print("데이터 없음")
                  exit()

              last = valid[-1]

              actual = float(last['actualRate'])
              ideal = float(last['expectedRate'])

              print(f'actualRate={actual} | idealRate={ideal}')

              # 목표 도달 여부
              hit = actual >= TARGET

              if hit:
                  msg = f"""
🚨🚨 River Airdrop 목표 도달 🚨🚨

🎯 Target : {TARGET}
📊 Actual : {actual}
📈 Ideal  : {ideal}

🔥 목표 Actual Rate 도달!
"""
              else:
                  msg = f"""
📊 River Airdrop Update

Actual Rate : {actual}
Ideal Rate  : {ideal}
Target      : {TARGET}

⏱ 5분마다 자동 업데이트
"""

              tg_url = f'https://api.telegram.org/bot{TG_TOKEN}/sendMessage'

              body = json.dumps({
                  'chat_id': CHAT_ID,
                  'text': msg
              }).encode()

              req2 = urllib.request.Request(
                  tg_url,
                  data=body,
                  headers={'Content-Type': 'application/json'},
                  method='POST'
              )

              urllib.request.urlopen(req2)

              if hit:
                  print("🚨 목표 달성 알림 전송")
              else:
                  print("📊 일반 업데이트 전송")

          except Exception as e:
              print("에러 발생:", e)

          EOF
