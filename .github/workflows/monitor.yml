name: River Airdrop Monitor

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Create monitor script
        run: |
          cat << 'PYTHON' > monitor.py
          import urllib.request
          import json
          import time

          TARGET = 0.01
          TG_TOKEN = "${{ secrets.TG_TOKEN }}"
          CHAT_ID = "${{ secrets.CHAT_ID }}"

          API_URL = "https://api-airdrop.river.inc/s2/pts-conversion-chart?interval=1d"

          def get_data():
              for i in range(3):
                  try:
                      req = urllib.request.Request(API_URL, headers={"Cache-Control":"no-store"})
                      with urllib.request.urlopen(req, timeout=10) as res:
                          return json.loads(res.read())
                  except Exception as e:
                      print("API retry:", e)
                      time.sleep(2)
              return None

          data = get_data()

          if not data:
              print("API failed")
              exit()

          valid = [x for x in data["data"] if x["actualRate"] is not None]

          if not valid:
              print("No valid data")
              exit()

          last = valid[-1]

          actual = float(last["actualRate"])
          ideal = float(last["expectedRate"])

          print("Actual:", actual)
          print("Ideal:", ideal)

          if actual >= TARGET:
              message = f"""
🚨 River Airdrop 목표 도달!

Actual Rate : {actual}
Target      : {TARGET}

🔥 목표 Actual Rate 달성
"""
          else:
              message = f"""
📊 River Update

Actual Rate : {actual}
Ideal Rate  : {ideal}
Target      : {TARGET}

⏱ Update every 5 minutes
"""
          tg_url = f"https://api.telegram.org/bot{TG_TOKEN}/sendMessage"

          body = json.dumps({
              "chat_id": CHAT_ID,
              "text": message
          }).encode()

          req = urllib.request.Request(
              tg_url,
              data=body,
              headers={"Content-Type": "application/json"},
              method="POST"
          )

          urllib.request.urlopen(req)

          print("Telegram message sent")
          PYTHON

      - name: Run monitor
        run: python3 monitor.py
