name: River Airdrop Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Check Rate and Send Telegram
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          python3 << 'PYEOF'
          import urllib.request
          import json
          import os
          from datetime import datetime, timezone, timedelta

          TARGET = 0.01
          COND = 'gte'
          TG_TOKEN = os.environ['TG_TOKEN']
          CHAT_ID = os.environ['CHAT_ID']
          KST = timezone(timedelta(hours=9))

          def send_telegram(msg):
              url = 'https://api.telegram.org/bot' + TG_TOKEN + '/sendMessage'
              body = json.dumps({'chat_id': CHAT_ID, 'text': msg}).encode()
              req = urllib.request.Request(
                  url, data=body,
                  headers={'Content-Type': 'application/json'},
                  method='POST'
              )
              urllib.request.urlopen(req)

          def fetch_rate():
              url = 'https://api-airdrop.river.inc/s2/pts-conversion-chart?interval=1d'
              req = urllib.request.Request(
                  url,
                  headers={'Cache-Control': 'no-store', 'User-Agent': 'Mozilla/5.0'}
              )
              with urllib.request.urlopen(req) as res:
                  data = json.loads(res.read())
              valid = [x for x in data['data'] if x['actualRate'] is not None]
              last = valid[-1]
              return last['actualRate'], last['expectedRate']

          now_kst = datetime.now(KST).strftime('%Y-%m-%d %H:%M:%S')

          actual, ideal = fetch_rate()
          hit = (COND == 'gte' and actual >= TARGET) or (COND == 'lte' and actual <= TARGET)

          print('actualRate=' + str(actual) + ' | idealRate=' + str(ideal) + ' | ' + now_kst)

          if hit:
              msg = '=============================\n'
              msg += '🚨 목표 Actual Rate 도달!! 🚨\n'
              msg += '=============================\n\n'
              msg += 'Actual Rate : ' + str(actual) + '\n'
              msg += 'Ideal Rate  : ' + str(ideal) + '\n'
              msg += '목표        : ' + str(TARGET) + ' 이상\n\n'
              msg += '지금 바로 확인하세요!\n'
              msg += '=============================\n'
              msg += '조회 시각: ' + now_kst
          else:
              pct = round((actual / TARGET) * 100, 1)
              msg = '[River 전환율 현황]\n\n'
              msg += 'Actual Rate : ' + str(actual) + '\n'
              msg += 'Ideal Rate  : ' + str(ideal) + '\n'
              msg += '목표        : ' + str(TARGET) + ' 이상\n'
              msg += '달성률      : ' + str(pct) + '%\n\n'
              msg += '조회 시각: ' + now_kst

          send_telegram(msg)
          print('텔레그램 전송 완료')
          PYEOF
