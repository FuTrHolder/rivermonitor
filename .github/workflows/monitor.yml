name: River Airdrop Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Monitor & Respond to Commands
        run: |
          python3 << 'EOF'
          import urllib.request
          import json
          from datetime import datetime, timezone, timedelta

          TARGET = 0.01
          COND = 'gte'
          TG_TOKEN = '${{ secrets.TG_TOKEN }}'
          CHAT_ID = '${{ secrets.CHAT_ID }}'
          KST = timezone(timedelta(hours=9))

          def send_telegram(msg):
              url = f'https://api.telegram.org/bot{TG_TOKEN}/sendMessage'
              body = json.dumps({'chat_id': CHAT_ID, 'text': msg, 'parse_mode': 'HTML'}).encode()
              req = urllib.request.Request(url, data=body, headers={'Content-Type': 'application/json'}, method='POST')
              urllib.request.urlopen(req)

          def get_updates():
              url = f'https://api.telegram.org/bot{TG_TOKEN}/getUpdates?offset=-5&limit=5'
              with urllib.request.urlopen(url) as res:
                  return json.loads(res.read())

          def fetch_rate():
              url = 'https://api-airdrop.river.inc/s2/pts-conversion-chart?interval=1d'
              req = urllib.request.Request(url, headers={'Cache-Control': 'no-store'})
              with urllib.request.urlopen(req) as res:
                  data = json.loads(res.read())
              valid = [x for x in data['data'] if x['actualRate'] is not None]
              last = valid[-1]
              return last['actualRate'], last['expectedRate']

          # 현재 Rate 조회
          actual, ideal = fetch_rate()
          now = datetime.now(KST).strftime('%Y-%m-%d %H:%M:%S')
          print(f'actualRate={actual} | idealRate={ideal} | 목표={TARGET} | {now}')

          # /확인 명령어 감지
          updates = get_updates()
          for update in updates.get('result', []):
              msg = update.get('message', {})
              text = msg.get('text', '')
              msg_time = msg.get('date', 0)
              # 최근 6분 이내 메시지만 처리
              now_ts = datetime.now(timezone.utc).timestamp()
              if '/확인' in text and (now_ts - msg_time) < 360:
                  hit = (COND == 'gte' and actual >= TARGET) or (COND == 'lte' and actual <= TARGET)
                  status = '🚨 목표 도달!' if hit else '⏳ 목표 미달성'
                  reply = (
                      f'📊 <b>현재 River Airdrop 상태</b>\n\n'
                      f'• Actual Rate: <b>{actual}</b>\n'
                      f'• Ideal Rate: {ideal}\n'
                      f'• 목표: {TARGET} ({">=" if COND == "gte" else "<="})\n'
                      f'• 상태: {status}\n'
                      f'• 조회 시각: {now}'
                  )
                  send_telegram(reply)
                  print(f'/확인 명령어 감지 → 응답 전송')

          # 목표 도달 시 알림
          hit = (COND == 'gte' and actual >= TARGET) or (COND == 'lte' and actual <= TARGET)
          if hit:
              send_telegram(
                  f'🚨 <b>River Airdrop 알림</b>\n\n'
                  f'Actual Rate 목표 도달!\n\n'
                  f'📊 actualRate = <b>{actual}</b>\n'
                  f'🎯 목표 = {TARGET}\n'
                  f'⏰ {now}'
              )
              print('✅ 목표 도달 알림 전송!')
          else:
              print(f'목표 미달성 ({actual} / {TARGET})')
          EOF
```

**"Commit changes"** 클릭

---

### 사용 방법

텔레그램에서 봇에게 `/확인` 입력 → **최대 5분 이내**에 아래처럼 응답이 와요:
```
📊 현재 River Airdrop 상태

- Actual Rate: 0.00660073
- Ideal Rate: 0.0211111
- 목표: 0.01 (>=)
- 상태: ⏳ 목표 미달성
- 조회 시각: 2026-03-13 16:30:00
              print(f'목표 미달성 ({actual} / {TARGET})')
          EOF
