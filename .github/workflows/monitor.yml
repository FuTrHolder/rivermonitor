name: River Airdrop Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Check Rate
        run: |
          python3 <<EOF
          import urllib.request
          import json

          TARGET = 0.01
          TG_TOKEN = "${{ secrets.TG_TOKEN }}"
          CHAT_ID = "${{ secrets.CHAT_ID }}"

          url = "https://api-airdrop.river.inc/s2/pts-conversion-chart?interval=1d"

          req = urllib.request.Request(url)
          res = urllib.request.urlopen(req)
          data = json.loads(res.read())

          valid = [x for x in data["data"] if x["actualRate"] is not None]
          last = valid[-1]

          actual = float(last["actualRate"])
          ideal = float(last["expectedRate"])

          if actual >= TARGET:
              msg = f"🚨 River Airdrop 목표 도달!\\nActual: {actual}\\nTarget: {TARGET}"
          else:
              msg = f"📊 River Update\\nActual: {actual}\\nIdeal: {ideal}"

          tg_url = f"https://api.telegram.org/bot{TG_TOKEN}/sendMessage"

          body = json.dumps({
              "chat_id": CHAT_ID,
              "text": msg
          }).encode()

          req2 = urllib.request.Request(
              tg_url,
              data=body,
              headers={"Content-Type": "application/json"},
              method="POST"
          )

          urllib.request.urlopen(req2)

          print("telegram sent")
          EOF
