name: River Airdrop Monitor

on:
  schedule:
    - cron: '*/5 * * * *'  # 5분마다 실행
  workflow_dispatch:  # 수동 실행 버튼

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Check Actual Rate & Alert
        run: |
          python3 << 'EOF'
          import urllib.request
          import json
          import os

          TARGET = 0.01
          COND = 'gte'
          TG_TOKEN = '${{ secrets.TG_TOKEN }}'
          CHAT_ID = '${{ secrets.CHAT_ID }}'

          # API 호출
          url = 'https://api-airdrop.river.inc/s2/pts-conversion-chart?interval=1d'
          req = urllib.request.Request(url, headers={'Cache-Control': 'no-store'})
          with urllib.request.urlopen(req) as res:
              data = json.loads(res.read())

          valid = [x for x in data['data'] if x['actualRate'] is not None]
          last = valid[-1]
          actual = last['actualRate']
          ideal = last['expectedRate']

          print(f'actualRate={actual} | idealRate={ideal} | 목표={TARGET}')

          hit = (COND == 'gte' and actual >= TARGET) or (COND == 'lte' and actual <= TARGET)

          if hit:
              msg = f'🚨 River Airdrop 알림\n\nActual Rate 목표 도달!\n\n📊 actualRate = {actual}\n🎯 목표 = {TARGET}'
              tg_url = f'https://api.telegram.org/bot{TG_TOKEN}/sendMessage'
              body = json.dumps({'chat_id': CHAT_ID, 'text': msg}).encode()
              req2 = urllib.request.Request(tg_url, data=body, headers={'Content-Type': 'application/json'}, method='POST')
              urllib.request.urlopen(req2)
              print('✅ 텔레그램 알림 전송!')
          else:
              print(f'목표 미달성 ({actual} / {TARGET})')
          EOF
